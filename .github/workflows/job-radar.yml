name: Job Radar

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: ~/.job-radar
          key: job-radar-state-${{ github.run_id }}
          restore-keys: |
            job-radar-state-

      - name: Install job-radar
        run: pip install -e .

      - name: Run check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: job-radar check --notify --quiet
